services:
  postgres:
    image: postgres:16-alpine
    container_name: emprenor-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: emprenor
      POSTGRES_PASSWORD: emprenor_local
      POSTGRES_DB: emprenor
    volumes:
      - emprenor_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emprenor -d emprenor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  emprenor_pg_data:
